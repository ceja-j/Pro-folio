<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Wrap and Align Content</title>
    <style>
        h1, h2 {
            text-align: center;
        }

        #container {
            border: 5px solid black;
            background-color: lightgreen;
            display: flex;
            flex-wrap: wrap-reverse;
            align-content: center;
            height: 700px;
        }
        .box {
            border: 1px solid black;
            background-color: lightcyan;
            width: 100px;
            height: 100px;
            padding: .5rem;
        }

        @media screen  and (min-width: 800px) {
            body { background-color: lightgrey;
            }
            
        }

    </style>
</head>
<body>
    <div id="container">
        <div class="box item001"></div>
        <div class="box item002"></div>
        <div class="box item003"></div>
        <div class="box item004"></div>
        <div class="box item005"></div>
        <div class="box item006"></div>
        <div class="box item007"></div>
        <div class="box item008"></div>
    </div>
</body>
</html>
