<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Wrap and Align Content</title>
    <style>
        h1, h2 {
            text-align: center;
        }

        #container {
            border: 5px solid black;
            background-color: lightgreen;
            display: flex;
            flex-wrap: wrap-reverse;
            align-content: center;
            height: 700px;
        }
        .box {
            border: 1px solid black;
            background-color: lightcyan;
            width: 100px;
            height: 100px;
            padding: .5rem;
        }

        @media screen  and (min-width: 800px) {
            body { background-color: lightgrey;
            }
            
        }
        @media screen and (min-width:100px) {
            body { background-color: lightblue;
            }
            
        }

    </style>
</head>
<h1>Flexbox</h1>
<h2>Flex-Wrap - Align Content</h2>
<h2>Container001</h2>
<body>
    <div id="container">
        <div class="box item001">Item001</div>
        <div class="box item002">Item002</div>
        <div class="box item003">Item003</div>
        <div class="box item004">Item004</div>
        <div class="box item005">Item005</div>
        <div class="box item006">Item006</div>
        <div class="box item007">Item007</div>
        <div class="box item008">Item008</div>
    </div>
</body>
</html>
