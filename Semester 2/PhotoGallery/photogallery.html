<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Photo Gallery</title>
    <style>
        h1{
            text-align: center;
        }
        .gallery{
background-color: aqua;
border: 4px solid blue;
width: 90%;
max-width: 1280px;
margin: 0 auto;
display: flex;
flex-wrap: wrap;
justify-content: center;
        }
        figure{
            background-color: thistle;
            width: 100%;
            max-width: 250px;
            padding: 1rem;
        }
        figcaption{
            text-align: center;
            color: cadetblue;
            padding: .5rem;
        }
        img{
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Flexbox Photo Gallery</h1>

<div class="gallery">

<figure>
    <img src="https://picsum.photos/300/300/?random=1" alt="Photo 1"> <figcaption>Photo 1</figcaption>
</figure>

<figure>
    <img src="https://picsum.photos/300/300/?random=2" alt="Photo 2"> <figcaption>Photo 2</figcaption>
</figure>

<figure>
    <img src="https://picsum.photos/300/300/?random=3" alt="Photo 3"> <figcaption>Photo 3</figcaption>
</figure>

<figure>
    <img src="https://picsum.photos/300/300/?random=4" alt="Photo 4"> <figcaption>Photo 4</figcaption>
</figure>

<figure>
    <img src="https://picsum.photos/300/300/?random=5" alt="Photo 5"> <figcaption>Photo 5</figcaption>
</figure>

<figure>
    <img src="https://picsum.photos/300/300/?random=6" alt="Photo 6"> <figcaption>Photo 6</figcaption>
</figure>

</div>

</body>
</html>
